<!DOCTYPE html>
<html>
<head>
    <title>Trading Bot Dashboard</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Monaco', 'Courier New', monospace;
            background: #0a0e27;
            color: #00ff41;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2em;
            text-shadow: 0 0 10px #00ff41;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .panel {
            background: #1a1f3a;
            border: 2px solid #00ff41;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.3);
        }
        .panel h2 {
            margin-bottom: 15px;
            color: #00ff41;
            font-size: 1.3em;
        }
        .stat {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #2a3f5a;
        }
        .stat:last-child { border-bottom: none; }
        .stat-label { color: #7a8fa3; }
        .stat-value { color: #00ff41; font-weight: bold; }
        .positive { color: #00ff41; }
        .negative { color: #ff4136; }
        .thoughts {
            background: #1a1f3a;
            border: 2px solid #00ff41;
            border-radius: 10px;
            padding: 20px;
            height: 400px;
            overflow-y: auto;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.3);
        }
        .thought {
            padding: 8px 0;
            border-bottom: 1px solid #2a3f5a;
            animation: fadeIn 0.3s;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .thought-time { color: #7a8fa3; margin-right: 10px; }
        .thought-trade { color: #ffd700; }
        .thought-error { color: #ff4136; }
        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }
        button {
            background: #00ff41;
            color: #0a0e27;
            border: none;
            padding: 15px 30px;
            font-size: 1em;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
        }
        button:hover {
            background: #00cc33;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.5);
        }
        .status {
            text-align: center;
            padding: 10px;
            margin-bottom: 20px;
            border-radius: 5px;
            font-weight: bold;
        }
        .status.running { background: rgba(0, 255, 65, 0.2); color: #00ff41; }
        .status.stopped { background: rgba(255, 65, 54, 0.2); color: #ff4136; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 TRADING BOT DASHBOARD</h1>
        
        <div class="status running" id="status">
            ● RUNNING - Paper Trading Mode
        </div>
        
        <div class="grid">
            <div class="panel">
                <h2>📊 Current Market</h2>
                <div class="stat">
                    <span class="stat-label">BTC Price</span>
                    <span class="stat-value" id="price">Loading...</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Z-Score</span>
                    <span class="stat-value" id="zscore">-</span>
                </div>
                <div class="stat">
                    <span class="stat-label">RSI</span>
                    <span class="stat-value" id="rsi">-</span>
                </div>
                <div class="stat">
                    <span class="stat-label">ADX</span>
                    <span class="stat-value" id="adx">-</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Regime</span>
                    <span class="stat-value" id="regime">-</span>
                </div>
            </div>
            
            <div class="panel">
                <h2>💰 Performance</h2>
                <div class="stat">
                    <span class="stat-label">Balance</span>
                    <span class="stat-value" id="balance">$10,000.00</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Total P&L</span>
                    <span class="stat-value" id="pnl">$0.00</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Total Trades</span>
                    <span class="stat-value" id="trades">0</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Win Rate</span>
                    <span class="stat-value" id="winrate">0%</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Open Positions</span>
                    <span class="stat-value" id="positions">0</span>
                </div>
            </div>
        </div>
        
        <div class="panel">
            <h2>🧠 Bot Thoughts (Live)</h2>
            <div class="thoughts" id="thoughts">
                <div class="thought">Waiting for bot to start...</div>
            </div>
        </div>
        
        <div class="controls">
            <button onclick="refreshLogs()">🔄 Refresh</button>
            <button onclick="viewFullLogs()">📋 Full Logs</button>
            <button onclick="stopBot()">⏹️ Stop Bot</button>
        </div>
    </div>
    
    <script>
        let lastLogSize = 0;
        
        async function fetchLogs() {
            try {
                const response = await fetch('/home/haze/.pm2/logs/trading-bot-out.log');
                const text = await response.text();
                const lines = text.split('\n').filter(l => l.trim());
                
                // Parse latest thoughts
                const thoughts = lines.slice(-50).map(line => {
                    const match = line.match(/\[(\d+:\d+:\d+)\] (.+)/);
                    if (match) {
                        return { time: match[1], message: match[2] };
                    }
                    return null;
                }).filter(t => t);
                
                // Update thoughts display
                const thoughtsDiv = document.getElementById('thoughts');
                thoughtsDiv.innerHTML = thoughts.map(t => {
                    let className = 'thought';
                    if (t.message.includes('BUY') || t.message.includes('SELL')) className += ' thought-trade';
                    if (t.message.includes('⚠️') || t.message.includes('❌')) className += ' thought-error';
                    
                    return `<div class="${className}">
                        <span class="thought-time">${t.time}</span>
                        ${t.message}
                    </div>`;
                }).join('');
                
                // Scroll to bottom
                thoughtsDiv.scrollTop = thoughtsDiv.scrollHeight;
                
                // Parse latest stats from logs
                const latestLine = lines[lines.length - 1];
                if (latestLine.includes('BTC:')) {
                    const priceMatch = latestLine.match(/BTC: \$([0-9,]+\.\d+)/);
                    if (priceMatch) {
                        document.getElementById('price').textContent = '$' + priceMatch[1];
                    }
                    
                    const zMatch = latestLine.match(/Z: ([-\d.]+)/);
                    if (zMatch) document.getElementById('zscore').textContent = zMatch[1];
                    
                    const rsiMatch = latestLine.match(/RSI: ([\d.]+)/);
                    if (rsiMatch) document.getElementById('rsi').textContent = rsiMatch[1];
                    
                    const adxMatch = latestLine.match(/ADX: ([\d.]+)/);
                    if (adxMatch) document.getElementById('adx').textContent = adxMatch[1];
                }
                
            } catch (error) {
                console.error('Failed to fetch logs:', error);
            }
        }
        
        function refreshLogs() {
            fetchLogs();
        }
        
        function viewFullLogs() {
            window.open('file:///home/haze/.pm2/logs/trading-bot-out.log', '_blank');
        }
        
        function stopBot() {
            if (confirm('Stop the trading bot?')) {
                alert('Run: pm2 stop trading-bot');
            }
        }
        
        // Auto-refresh every 2 seconds
        setInterval(fetchLogs, 2000);
        fetchLogs();
    </script>
</body>
</html>
